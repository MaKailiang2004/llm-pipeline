version: "3.9"

services:
  ray-worker-remote:
    image: ${RAY_IMAGE_NAME:-llm-pipeline/ray:latest}
    container_name: ray-worker-remote
    restart: unless-stopped
    entrypoint:
      - /bin/bash
      - /workspace/scripts/start_ray_node.sh
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      RAY_NODE_ROLE: worker
      RAY_CLUSTER_JOIN_ADDRESS: ${RAY_CLUSTER_JOIN_ADDRESS}
      RAY_NODE_IP: ${RAY_WORKER_NODE_IP:-}
      RAY_HEAD_PORT: ${RAY_HEAD_PORT:-6379}
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      HADOOP_HOME: /opt/hadoop
      ARROW_LIBHDFS_DIR: /opt/hadoop/lib/native
      LD_LIBRARY_PATH: /opt/hadoop/lib/native:/usr/lib/jvm/java-17-openjdk-amd64/lib/server:/usr/local/cuda/lib64
      CLASSPATH: /opt/hadoop/etc/hadoop:/opt/hadoop/share/hadoop/common/*:/opt/hadoop/share/hadoop/common/lib/*:/opt/hadoop/share/hadoop/hdfs/*:/opt/hadoop/share/hadoop/hdfs/lib/*
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    runtime: nvidia
    network_mode: host
    ipc: host
    volumes:
      - .:/workspace
      - huggingface_cache:/root/.cache/huggingface
    working_dir: /workspace

volumes:
  huggingface_cache:
